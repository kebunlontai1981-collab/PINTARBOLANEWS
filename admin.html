<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>PintarBola Admin</title>
</head>
<body class="bg-slate-950 text-white p-8">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-black mb-8 text-green-500">ADMIN DASHBOARD</h1>
        
        <!-- Form Update Skor -->
        <div class="bg-slate-900 p-6 rounded-2xl mb-8 border border-slate-800">
            <h2 class="font-bold mb-4 border-b border-slate-800 pb-2">Update Skor Highlight</h2>
            <input id="score" class="w-full p-3 rounded bg-slate-800 mb-4" placeholder="Skor (ex: 2 - 1)">
            <button onclick="saveData()" class="bg-green-600 px-6 py-2 rounded-lg font-bold w-full hover:bg-green-500">Simpan Skor</button>
        </div>

        <!-- Form Update Berita -->
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <h2 class="font-bold mb-4 border-b border-slate-800 pb-2">Update Judul Berita Utama</h2>
            <input id="headline" class="w-full p-3 rounded bg-slate-800 mb-4" placeholder="Judul Berita Terbaru">
            <button onclick="saveData()" class="bg-blue-600 px-6 py-2 rounded-lg font-bold w-full hover:bg-blue-500">Simpan Berita</button>
        </div>
    </div>

    <script>
        async function saveData() {
            const data = {
                score: document.getElementById('score').value,
                headline: document.getElementById('headline').value
            };
            
            // Ganti YOUR_BIN_ID dan YOUR_MASTER_KEY
            await fetch('https://api.jsonbin.io/v3/b/YOUR_BIN_ID', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': 'YOUR_MASTER_KEY' },
                body: JSON.stringify(data)
            });
            alert('Data Berhasil Disimpan!');
        }
    </script>
</body>
</html>
